name: main
concurrency: ci-${{ github.ref }}

on:
  push:
    branches: [ master, development ]

jobs:
  prepare:
    name: 🔨 Initialisieren
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.prop }}
      commit: ${{ steps.set-commit.outputs.commit }}
    steps:
    - uses: actions/checkout@v3
    - name: get version
      id: version
      uses: notiz-dev/github-action-json-property@v0.2.0
      with:
          path: 'package.json'
          prop_path: 'version'
    - name: set commit
      id: set-commit
      run: echo "commit=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

  build-frontend:
    name: 🐳 Frontend
    continue-on-error: false
    needs: prepare
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Docker meta
      id: docker_meta
      uses: docker/metadata-action@v4
      with:
        images: codeanker/brahmsee-client
        tags: type=sha,prefix=
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v2
    - name: set mode staging
      if: github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/heads/release/')
      run: echo 'MODE=staging' >> "$GITHUB_ENV"
    - name: set mode production
      if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/release/')
      run: echo 'MODE=production' >> "$GITHUB_ENV"
    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@v4
      with:
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.docker_meta.outputs.tags }}
        labels: ${{ steps.docker_meta.outputs.labels }}
        file: ./frontend/Dockerfile
        context: ./
        build-args: |
          commitHash=${{needs.prepare.outputs.commit}}
          version=${{needs.prepare.outputs.version}}
          mode=${{ env.MODE }}
  lint-all:
    needs: prepare
    name: 🔍 Lint Project
    runs-on: ubuntu-latest
    steps:
    - name: Git checkout
      uses: actions/checkout@v3
    - name: Use Node.js 18.14.2
      uses: actions/setup-node@v3
      with:
        node-version: 18.14.2
    - run: npm ci -D --ignore-scripts
    - run: npm run lint

  build-api:
    name: 🐳 API
    needs: prepare
    continue-on-error: false
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Docker meta
      id: docker_meta
      uses: docker/metadata-action@v4
      with:
        images: codeanker/brahmsee-api
        tags: type=sha,prefix=
    - name: Docker Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v2
    - name: Build and push
      id: docker_build
      uses: docker/build-push-action@v4
      with:
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.docker_meta.outputs.tags }}
        labels: ${{ steps.docker_meta.outputs.labels }}
        file: ./api/Dockerfile
        context: ./
