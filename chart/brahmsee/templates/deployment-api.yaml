apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-api
  labels:
    {{- include "codeanker.label" . | indent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-api
        {{- include "codeanker.label" . | indent 8 }}
      annotations:
        co.elastic.logs/enabled: 'true'
        co.elastic.logs/fileset.stdout: access
        co.elastic.logs/fileset.stderr: error
    spec:
      initContainers:
        - name: init-api
          image: codeanker/{{ .Chart.Name }}-api:{{ .Values.global.commit }}
          command: ['npm', 'run', 'bootstrap', '-w', './api']
          env:
            - name: DOTENV_CONFIG_PATH
              value: /vault/secrets/env
            - name: CLIENT_URL
              value: https://{{ index .Values.global.ingress.hosts 0 }}
            - name: NODE_ENV
              value: {{ .Values.global.env }}
            - name: COMMIT_HASH
              value: "{{ .Values.global.commit }}"
            - name: VERSION
              value: "{{ .Chart.Version }}"
            - name: MONGODB
              value: {{ .Values.global.mongodb.uri }}
            - name: PORT
              value: "80"
            - name: AWS_S3_SECRET
              valueFrom:
                secretKeyRef:
                  name: s3
                  key: SECRET
            - name: AWS_S3_KEY
              valueFrom:
                secretKeyRef:
                  name: s3
                  key: KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3
                  key: BUCKET
            - name: AWS_S3_SHARED_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3
                  key: SHARED_BUCKET
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sendgrid
                  key: KEY
      containers:
        - name: {{ .Chart.Name }}-api
          image: codeanker/{{ .Chart.Name }}-api:{{ .Values.global.commit }}
          command: ['npm', 'run', 'start', '-w', './api']
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: DOTENV_CONFIG_PATH
              value: /vault/secrets/env
            - name: CLIENT_URL
              value: https://{{ index .Values.global.ingress.hosts 0 }}
            - name: NODE_ENV
              value: {{ .Values.global.env }}
            - name: COMMIT_HASH
              value: "{{ .Values.global.commit }}"
            - name: VERSION
              value: "{{ .Chart.Version }}"
            - name: MONGODB
              value: {{ .Values.global.mongodb.uri }}
            - name: PORT
              value: "80"
            - name: AWS_S3_SECRET
              valueFrom:
                secretKeyRef:
                  name: s3
                  key: SECRET
            - name: AWS_S3_KEY
              valueFrom:
                secretKeyRef:
                  name: s3
                  key: KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3
                  key: BUCKET
            - name: AWS_S3_SHARED_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3
                  key: SHARED_BUCKET
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sendgrid
                  key: KEY
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ready
              port: 9000
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /live
              port: 9000
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          resources:
{{ toYaml .Values.api.resources | indent 12 }}
      imagePullSecrets:
        - name: codeanker-docker-key
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-api-svc
  labels:
    app: {{ .Chart.Name }}-api
    {{- include "codeanker.label" . | indent 4 }}
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
  selector:
    app: {{ .Chart.Name }}-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Chart.Name }}-api-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-api
